# See https://wiki.hypr.land/Configuring/Keywords/

# applications
$fm     = uwsm-app -- nautilus
$term   = uwsm-app -- wezterm -e tmux
$menu   = uwsm-app -- walker
$clipm  = uwsm-app -- copyq show
$osd    = uwsm-app -- swayosd-client
$calc   = uwsm-app -- gnome-calculator
$logout = uwsm-app -- wlogout

# scripts
$ocr            = uwsm-app -- ~/.config/hypr/scripts/ocr.sh
$toggleMic      = uwsm-app -- ~/.config/hypr/scripts/toggle-mic.sh
$screenshot     = uwsm-app -- ~/.config/hypr/scripts/screenshot.sh
$toggleTouchpad = uwsm-app -- ~/.config/hypr/scripts/toggle-touchpad.sh

# See https://wiki.hypr.land/Configuring/Keywords/
$mod = SUPER
$resizeStep = 30

# see https://wiki.hypr.land/Configuring/Binds/ for more

# applications
bind =  ALT, SPACE,  exec, $menu
bind = $mod, RETURN, exec, $term
bind = $mod, E, exec, $fm
bind = $mod, V, exec, $clipm
bind = $mod, C, exec, $calc
bind = ,XF86Calculator, exec, $calc

# scratchpads
bind = $mod, O, togglespecialworkspace, scratchpad
bind = $mod, B, togglespecialworkspace, btop

# layout and window management
bind = $mod, Q, killactive
bind = $mod, F, fullscreen
bind = $mod, P, pseudo, # dwindle
bind = $mod, S, layoutmsg, togglesplit # dwindle
bind = $mod, T, togglegroup
bind = $mod, G, togglegroup
bind = $mod, N, changegroupactive, f
bind = $mod, P, changegroupactive, b
bind = $mod, SPACE, cyclenext
bind = $mod SHIFT, SPACE, togglefloating

# session management
bind = $mod, X, exec, $logout

# Scroll through existing workspaces with mod + scroll
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# Move/resize windows with mod + LMB/RMB and dragging
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume,  exec, $osd --output-volume raise
bindel = ,XF86AudioLowerVolume,  exec, $osd --output-volume lower
bindel = ,XF86MonBrightnessUp,   exec, $osd --brightness raise
bindel = ,XF86MonBrightnessDown, exec, $osd --brightness lower
bindel = ,XF86AudioMute,         exec, $osd --output-volume mute-toggle
bindel = ,XF86AudioMicMute,      exec, $toggleMic
bindel = ,XF86TouchpadToggle,    exec, $toggleTouchpad

# media keys
bindl = ,XF86AudioNext,  exec, $osd --playerctl next
bindl = ,XF86AudioPrev,  exec, $osd --playerctl previous
bindl = ,XF86AudioPause, exec, $osd --playerctl play-pause
bindl = ,XF86AudioPlay,  exec, $osd --playerctl play-pause

# screenshots & ocr
bind = $mod  , Print, exec, $ocr
bindl =      , Print, exec, $screenshot full
bindl = SHIFT, Print, exec, $screenshot smart

# cycle monitors
bind = $mod, bracketright, focusmonitor, r
bind = $mod, bracketleft , focusmonitor, l

bind = $mod SHIFT, bracketright, movecurrentworkspacetomonitor, r
bind = $mod SHIFT, bracketleft, movecurrentworkspacetomonitor, l

# resize with mod + r
bind = $mod, R, submap, resize
submap = resize
binde = , H, resizeactive, -$resizeStep 0
binde = , J, resizeactive, 0 $resizeStep
binde = , K, resizeactive, 0 -$resizeStep
binde = , L, resizeactive, $resizeStep 0

# escape to exit resize mode
bind = , escape, submap, reset
submap = reset

# Move focus with mod + hjkl
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r

# Swap active window with the one next to it with SUPER + SHIFT + hjkl
bind = $mod SHIFT, H, swapwindow, l
bind = $mod SHIFT, J, swapwindow, d
bind = $mod SHIFT, K, swapwindow, u
bind = $mod SHIFT, L, swapwindow, r

# Switch workspaces with mod + [0-9]
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move active window to a workspace with mod + SHIFT + [0-9]
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10
