- name: Install Proton VPN repository package
  apt:
    deb: https://repo.protonvpn.com/debian/dists/stable/main/binary-all/protonvpn-stable-release_1.0.8_all.deb
    state: present
  become: true

- name: Install Proton VPN GNOME Desktop
  apt:
    name: proton-vpn-gnome-desktop
    state: present
    update_cache: true
  become: true
